command: ["python", "app/main.py"]
env:
  - name: SARVAM_API_KEY
    valueFrom: "secret/nyaya-sahayak/sarvam-api-key"
  - name: LLM_OPENAI_BASE_URL
    value: "https://api.sarvam.ai/v1"
  - name: LLM_MODEL
    value: "sarvam-m"
  - name: LLM_TEMPERATURE
    value: "0.2"
  - name: FAISS_INDEX_DIR
    value: "/Volumes/workspace/default/bharat_bricks_hacks/nyaya_index"
  - name: PARENT_STORE_DIR
    value: "/Volumes/workspace/default/bharat_bricks_hacks/nyaya_index"
  - name: NYAYA_CATALOG
    value: "workspace"
  - name: NYAYA_SCHEMA
    value: "default"
